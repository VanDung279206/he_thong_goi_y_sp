<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý - SendoAI Shop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="admin">
    <header class="topbar">
      <a class="brand" href="admin.html" aria-label="SendoAI Admin"><span class="brand-logo">S</span><span>SendoAI Admin</span></a>
      <form class="search" role="search"><span aria-hidden="true">⌕</span><input id="adminSearchInput" type="search" placeholder="Tìm sản phẩm..." /></form>
      <nav class="nav-links" aria-label="Điều hướng">
        <a href="#adminDashboard">Dashboard</a>
        <a href="#model">Mô hình</a>
      </nav>
      <button class="theme-toggle" id="themeToggle" type="button" aria-label="Chuyển chế độ tối">●</button>
      <button class="ghost-button" id="logoutButton" type="button">Đăng xuất</button>
    </header>

    <main>
      <section id="adminDashboard" class="section admin-section">
        <div class="section-heading">
          <div><p class="eyebrow">Admin</p><h1>Quản lý</h1></div>
        </div>
        <div class="admin-grid">
          <article><span>Sản phẩm</span><strong id="adminProductCount">0</strong></article>
          <article><span>User train</span><strong id="adminUserCount">0</strong></article>
          <article><span>Interactions</span><strong id="adminInteractionCount">0</strong></article>
          <article><span>Epoch</span><strong id="adminEpochCount">5</strong></article>
        </div>
        <div class="admin-layout">
          <div class="admin-panel" style="position: relative;">
            <div class="loading-overlay" id="trainingOverlay"><div class="spinner"></div></div>
            <h3>Huấn luyện mô hình</h3>
            <div style="display: flex; flex-direction: column; gap: 10px;">
              <span id="trainingStatusText" style="font-size: 0.85rem; color: var(--muted); font-weight: 600;">Sẵn sàng</span>
              <button class="primary-button full-width" id="btnRetrain" type="button">Huấn luyện lại</button>
            </div>
          </div>
          <div class="admin-panel">
            <h3>Hybrid</h3>
            <div class="weight-control">
              <div><span>Trọng số</span><strong id="adminWeightLabel">55% CF / 45% CB</strong></div>
              <input id="adminHybridWeight" type="range" min="0" max="100" value="55" />
            </div>
            <div class="formula"><span>Formula</span><strong id="adminFormulaText">Hybrid = 0.55 × CF + 0.45 × CB</strong></div>
          </div>
          <div class="admin-panel">
            <h3>Top Hybrid</h3>
            <div class="admin-table" id="adminTopProducts"></div>
          </div>
          <div class="admin-panel">
            <h3>Danh mục</h3>
            <div class="admin-table" id="adminCategories"></div>
          </div>
        </div>
      </section>

      <section id="model" class="section model-section">
        <div class="section-heading">
          <div><p class="eyebrow">Training</p><h2>Mô hình</h2></div>
        </div>
        <div class="training-panel">
          <div><h3>RMSE</h3><div id="epochBars" class="epoch-bars"></div></div>
          <div class="metric-list">
            <div><span>Users</span><strong id="metricUsers">0</strong></div>
            <div><span>Items</span><strong id="metricItems">0</strong></div>
            <div><span>Interactions</span><strong id="metricInteractions">0</strong></div>
          </div>
        </div>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="model_data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
